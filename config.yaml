# =============================================================================
# config.yaml — edit this file to customise your job search
# No Python knowledge needed. Just edit the values below.
# =============================================================================


# -------------------------------------------------------
# WHAT to search for
# -------------------------------------------------------

search_terms:
  - economist
  - economic consultant
  - applied scientist
  - data scientist
  - research scientist
  - data analyst
  - product analyst


# -------------------------------------------------------
# WHERE to search
# filter_german: true  → exclude German-language postings
# filter_swedish: true → exclude Swedish-language postings
# -------------------------------------------------------

cities:
  - location: Berlin, Germany
    country_indeed: germany
    filter_german: true
    filter_swedish: false

#  - location: Hamburg, Germany
#    country_indeed: germany
#    filter_german: true
#    filter_swedish: false

#  - location: Amsterdam, Netherlands
#    country_indeed: netherlands
#    filter_german: false
#    filter_swedish: false

#  - location: Gothenburg, Sweden
#    country_indeed: sweden
#    filter_german: false
#    filter_swedish: true

  - location: Stockholm, Sweden
    country_indeed: sweden
    filter_german: false
    filter_swedish: true


# -------------------------------------------------------
# OUTPUT
# -------------------------------------------------------

database: jobs.db
hours_old: 72

# -------------------------------------------------------
# SCORING
# Higher score = more relevant = shown first
# -------------------------------------------------------

scoring:

  # A job must mention at least one of these to appear at all
  base_keywords:
    - machine learning
    - applied scientist
    - data scientist
    - research scientist
    - economist
    - causal
    - experimentation

  # Each match adds +1 to the score
  priority_keywords:
    - a/b test
    - ab test
    - causal inference
    - experimentation
    - randomized
    - difference-in-differences
    - instrumental variable
    - incrementality
    - uplift
    - treatment effect
    - forecasting
    - bayesian
    - pricing
    - structural model
    - demand model
    - heterogeneous
    - measurement
    - phd
    - economics
    - statistics
    - economist

  # These companies get +2 bonus points
  priority_companies:
    - zalando
    - perplexity
    - hellofresh
    - wolt
    - amazon
    - google
    - meta
    - netflix
    - spotify
    - delivery hero
    - n26
    - trade republic
    - sumup
    - klarna
    - booking.com
    - trivago
    - bolt
    - microsoft
    - apple
    - deepmind
    - waymo

  # Jobs with these words in the title are excluded immediately
  negative_title_keywords:
    - intern
    - internship
    - werkstudent
    - praktikum
    - entry level
    - graduate trainee
    - biology
    - physician
    - software engineer
    - mlops
    - devops
    - clinical
    - full-stack
    - physics

  # Avoid these companies
  blocked_companies:
    - mindrift
    - mercor

  # Lower priority to senior jobs
  senior_title_keywords:
    - principal
    - vp

# -------------------------------------------------------
# LANGUAGE FILTERING 
# -------------------------------------------------------

language_filters:

  german_words:
    - wir sind
    - ihre aufgaben
    - du hast
    - wir bieten
    - stellenbeschreibung
    - deine aufgaben
    - unser team

  german_required_phrases:
    - german is required
    - german required
    - fluent in german
    - fluency in german
    - proficiency in german
    - german language skills
    - german language required
    - business german
    - native german
    - c1 german
    - c2 german
    - "german (c"
    - deutschkenntnisse
    - deutsch voraussetzung

  swedish_words:
    - vi söker
    - vi erbjuder
    - dina arbetsuppgifter
    - om oss
    - vad vi erbjuder
    - din profil
    - kvalifikationer
    - välkommen
    - ansökan
    - tjänsten
    - hos oss

  swedish_required_phrases:
    - swedish is required
    - swedish required
    - fluent in swedish
    - fluency in swedish
    - proficiency in swedish
    - swedish language required
    - native swedish
    - svenska krävs
    - svenska är ett krav
